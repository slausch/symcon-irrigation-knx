name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Validate PHP syntax
        run: find IrrigationKNX tests -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Run state-machine tests
        run: php tests/run.php
      - name: Run contract tests
        run: python3 -m unittest tests/test_contract.py
